    <title>Notes on advanced HTML</title>
    <meta charset= "UTF-8">
        <!--embedded style, good practice, go inside the head tag -->
        <style>
            body{

                background-color: rgb(0, 255, 255);
                font-family: cursive;
            }
            p{
                background-color: rgba(255, 228, 196, 0.589);
                text-align: center;
            }
            #ordered{
                color: cornflowerblue;
            }
            .section-2{
                font-family: 'times new roman', fantasy;
                border: 3px solid whitesmoke;
            }
            .odd{
                color: orange;
                background-color: beige;
                color: #0B6623;
            }
            h1{
                 font-family: "Honk", system-ui;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-variation-settings:
    "MORF" 24,
    "SHLN" 50;
            }
            img{
                width: 250px;
            }
            .special{
                font-size: 30px;
                color: red;
            }
            #box{
                margin:5px;
                padding: 5px;
            }
        #nana{
        color: yellow;
    }
            .box-wrapper{
                display: block;
                margin: auto;
                width: 50%;
            }
            .lists-wrapper{
                display: grid;
                grid-template-columns: 50% 50%;
            }
            #img-wrapper{
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
            }
        </style>

</head>
<body>
    <h1>Advanced HTML</h1>
    <!--inline style, it is bad syntax-->
    <div class="boxwrapper">
    <div id="box">
        <p>this is in a div</p>
    </div>
</div>
<div id="lists-wrapper">

    <div id= "ordered">
    <p>This is how <span class="special">you make </span> an ordered list</p>
    <ol>
        <li>ba<span id="nana"> nana</span></li>
        <li>strawberry</li>
        <li>apple</li>
    </ol>
    </div>
    <div id= "unordered" class="section-2" >
    <ul style="list-style-type: circle;">
        <li>carrot</li>
        <li>tomato</li>
        <li>pea</li>
    </ul>
    </div>
    </div>
        <a href="https://www.w3schools.com/" target="_blank">W3schools unordered lists</a>
