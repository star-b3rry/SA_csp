<!--Hypertext Markup Language-->
<!DOCTYPE html> 
<html lang="en"><!--All HTML must be written between the tags-->
    <head><!--For information needed by the web browser, not shown to the user-->
        <title>HTML Basics Notes</title>
        <meta charset="UTF-8">
    </head>
    <body><!--For information that's shown to the user!-->
        <h1>HTML Basics Notes</h1>
        <h2>This is a sub heading</h2>
        <h6>This is the smallest subheading</h6>
        <p>This is a paragraph. This is the section where everything I write shows up on the page</p>
        <br>
        <p>New paragraph with new information!</p>

    </body>

</html>
