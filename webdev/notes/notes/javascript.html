            function change () {
                if(img_count >= img.length){
                    img_count = 0
                }else{
                    img_count += 1
                }
                document.getElementById("meme").src = imgs[img_count]
            }
            function color_change(){
                document.getElementById("meme").style.color = document.getElementById
                ('selected-color').value
            }
            function add(){
                count += 1
                document.getElementById('number').innerHTML = count
            }
            function hover(id){
                document.getElementById(id).style.backgroundColor = "red"
                 document.getElementById(id).style.backgroundColor = "white"
            }
            function unhover(id){
                document.getElementById(id).style.backgroundColor = "lightgray"
                 document.getElementById(id).style.backgroundColor = "black"
            }
            function popup(){
                alert("We're here to remind you about your car's extended warranty")
            }
            function show(){
                document.getElementById(liza).style.display == "block"
                document.getElementById(liza).style.display == "none"
            }
        </script>
