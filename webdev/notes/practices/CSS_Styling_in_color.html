<!DOCTYPE html>
<html lang ="en">
<head>
    <title>Styling in Color</title>
    <meta charset= "UTF-8">
    <style>
        h1{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: black;
        }
        #box{
            margin:5px;
            padding:5px;
           background-color: blue;
           border: 5px solid blue;
        }
        .boxwrapper{
            display: block;
            margin: auto;
            width: 25%;
            grid-template-columns: 50% 50%;
        }
    </style>
</head>
<body>
    <h1>Color Theory Examples</h1>
    <div class="box-wrapper">
        <div id="box">
            <p>Complementary Colors</p>
        </div>
    </div>
</body>
